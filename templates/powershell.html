<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>VirtualHelpDesk - PowerShell Field Reference (EN)</title>
<style>
  :root {
    --teal: #2b7a78;
    --teal-dark: #1e5957;
    --teal-light: #e8f6f5;
    --orange: #e8823c;
    --red: #e5484d;
    --ink: #1f2d2d;
    --paper: #ffffff;
    --panel: #f7f9f9;
    --border: #dfe6e6;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", sans-serif;
    background: var(--panel);
    color: var(--ink);
  }

  header {
    background: var(--paper);
    border-bottom: 1px solid var(--border);
    padding: 18px 28px;
    display: flex;
    align-items: baseline;
    gap: 14px;
  }

  header h1 {
    font-size: 18px;
    margin: 0;
    color: var(--teal-dark);
    letter-spacing: 0.2px;
  }

  header .badge {
    font-size: 11px;
    color: var(--teal);
    background: var(--teal-light);
    border: 1px solid var(--teal);
    border-radius: 999px;
    padding: 2px 10px;
    font-weight: 600;
    letter-spacing: 0.4px;
  }

  header p {
    margin: 0;
    font-size: 12.5px;
    color: #5c6a6a;
  }

  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: calc(100vh - 62px);
  }

  /* --- Sidebar --- */
  nav.sidebar {
    background: var(--paper);
    border-right: 1px solid var(--border);
    padding: 18px 10px;
    overflow-y: auto;
  }

  .category-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: #8a9797;
    padding: 14px 12px 6px;
    font-weight: 700;
  }

  .cmd-item {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    border-radius: 6px;
    padding: 7px 12px;
    font-size: 13px;
    color: var(--ink);
    cursor: pointer;
    font-family: 'Consolas', 'Cascadia Code', monospace;
  }

  .cmd-item:hover {
    background: var(--teal-light);
  }

  .cmd-item.active {
    background: var(--teal);
    color: white;
  }

  .cmd-item .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--orange);
    flex-shrink: 0;
  }

  .cmd-item.active .dot {
    background: white;
  }

  .cmd-item:not(.has-note) .dot {
    background: #cfd8d8;
  }

  /* --- Main content --- */
  main {
    padding: 26px 32px;
    max-width: 880px;
  }

  .empty-state {
    color: #8a9797;
    font-size: 14px;
    margin-top: 60px;
  }

  .terminal-card {
    background: #0c0c0c;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 6px 20px rgba(0,0,0,0.12);
  }

  .terminal-titlebar {
    background: #1f1f1f;
    padding: 9px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #999;
  }

  .terminal-titlebar .traffic {
    display: flex;
    gap: 6px;
  }

  .traffic span {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
  }

  .traffic .r { background: #e5484d; }
  .traffic .y { background: #f2c94c; }
  .traffic .g { background: #27ae60; }

  #terminalOutput {
    font-family: 'Consolas', 'Cascadia Code', monospace;
    font-size: 13px;
    color: #e6e6e6;
    white-space: pre-wrap;
    padding: 16px 18px;
    line-height: 1.45;
    max-height: 340px;
    overflow-y: auto;
  }

  .terminal-cursor {
    display: inline-block;
    width: 8px;
    height: 14px;
    background: #e6e6e6;
    animation: blink 1s step-start infinite;
    vertical-align: middle;
  }

  @keyframes blink { 50% { opacity: 0; } }

  /* --- Field note (signature element) --- */
  .fieldnote-wrap {
    margin-top: 22px;
    position: relative;
    animation: rise 0.25s ease-out;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .fieldnote {
    background: var(--paper);
    border: 1px solid var(--border);
    border-left: 5px solid var(--orange);
    border-radius: 6px;
    padding: 20px 24px 22px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }

  .fieldnote-tag {
    position: absolute;
    top: -11px;
    left: 20px;
    background: var(--orange);
    color: white;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 3px 10px;
    border-radius: 4px;
    text-transform: uppercase;
  }

  .fieldnote h3 {
    margin: 4px 0 14px;
    font-size: 15px;
    color: var(--ink);
  }

  .fn-row {
    display: grid;
    grid-template-columns: 88px 1fr;
    gap: 4px 14px;
    font-size: 13px;
    margin-bottom: 10px;
    line-height: 1.55;
  }

  .fn-row .fn-label {
    color: var(--teal-dark);
    font-weight: 700;
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    padding-top: 1px;
  }

  .fn-row .fn-value {
    color: #333;
  }

  .fn-point {
    margin-top: 14px;
    background: var(--teal-light);
    border-radius: 5px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--teal-dark);
  }

  .fn-point strong { color: var(--ink); }

  .fieldnote-empty {
    margin-top: 22px;
    border: 1px dashed var(--border);
    border-radius: 6px;
    padding: 16px 20px;
    font-size: 13px;
    color: #9aa5a5;
    background: #fbfcfc;
  }

  .cmd-title {
    font-family: 'Consolas', 'Cascadia Code', monospace;
    font-size: 20px;
    color: var(--ink);
    margin: 0 0 4px;
  }

  .cmd-sub {
    font-size: 12.5px;
    color: #8a9797;
    margin: 0 0 16px;
  }
</style>
</head>

/* ---------- 3. Field notes (episodes) ----------
   Add more entries here as you write them.
   Structure: situation / background / action / point
*/
const episodes = {

  acl: {
    situation: "Wanted to check permissions on a share like HR_Shared, but Get-Acl only returns the ACL for the single path you point it at — it doesn't walk subfolders, and it says nothing about a nested folder that's actually published as its own separate SMB share with different permissions",
    background: "For anything beyond a glance, the real breakdown — permissions folder by folder, inheritance, scope of application — had to come from the file server itself, exported per-folder from there rather than reconstructed from a PowerShell one-liner. In practice, checking a share's permissions with something like Get-Acl was more of a first-line, help-desk-tier sanity check — enough to see \"does this folder have some access control on it at all,\" not enough to confirm the actual state of who can do what",
    action: "For real management, the more reliable approach was maintaining, for each share, the user group with access alongside the exact list of user IDs in that group — kept as a single managed pair, jointly maintained with the folder's business owner rather than derived after the fact from a command. Share folders often fall under audit or compliance requirements, so this had to be treated as something strict and deliberately managed, not something to infer casually from a quick PowerShell check",
    point: "Given all that, Get-Acl on its own is a fairly weak tool for this job, and in practice it didn't get used often. One more thing worth flagging: \"ACL\" is a heavily overloaded term — on network equipment it usually refers to something completely different, like traffic prioritization rules on a load balancer or a whitelist on a spam firewall, not file permissions at all. Worth keeping straight so it doesn't get confused with the PC/file-server meaning"
  },

  nslookup: {
    situation: "A ticket comes in that an internal site won't display. Step one was figuring out whether the server itself was actually down",
    background: "If you remember the naming scheme (NYC for New York, LAX for Los Angeles, etc.), a quick nslookup NYCSERVER01 confirms name resolution instantly without opening the asset inventory. It also worked as the first move for separating \"server down\" from \"something wrong on the PC\" when an internal site failed to display",
    action: "If nslookup successfully resolved the target hostname and got a normal response from the internal DNS server, that confirmed the server itself was alive. From there, the investigation shifted away from \"host down\" and toward the client PC's configuration. Common culprits turned out to be: .NET Framework not installed, causing part of the page to silently fail to render; a JRE load error; a misconfigured ActiveX setting under Internet Options; or the hostname simply missing from the intranet zone's trusted sites list, causing content to be blocked",
    point: "The key is not jumping straight to \"server outage\" just because someone reports a site won't display. If nslookup confirms name resolution and the server response are both fine, the problem sits in the PC's local environment instead. Legacy internal systems in particular tend to depend on older technology like .NET Framework or ActiveX, so this kind of issue showed up most often right after a PC refresh or a fresh reinstall"
  },

  smbmapping: {
    situation: "A ticket comes in: \"I can't reach the share drive over VPN from outside the office.\" Get-SmbMapping shows the status as \"Disconnected,\" and the user assumes something is broken",
    background: "As security policy tightened in stages, connecting to internal server file shares from outside the office over VPN moved to being disallowed by default. During the pandemic, a few specific directories were allowed as a temporary exception over VPN, but that was never meant to be a permanent arrangement",
    action: "Checked the status with Get-SmbMapping. If the disconnected share was one that policy didn't permit over an external route, explained to the user that this wasn't a malfunction — it was the system working as intended. Since access from outside was heading toward being fully blocked as security kept tightening, the guidance was: come into the office and connect from the internal network if you need that resource",
    point: "There was more to this policy than just security. Users needed to come into the office at least once every three months anyway, to get Windows license renewals and group policy updates from the on-site KMS server — something an internet connection alone couldn't substitute for. Separately, the mapped drive configuration itself was never removed regardless of whether it was actually connected at the moment, because removing it would stop the server-side connection-history inventory catalog from updating. And operationally: when only a subfolder was permitted, map directly to that subfolder rather than the parent folder, and always confirm hidden shares were configured with a trailing $ in the name"
  },

  printer: {
    situation: "During a PC refresh, needed to carry over every printer setting from the old machine to the new one without missing anything",
    background: "Opening Devices & Printers in Control Panel every time to eyeball and note down the settings was tedious, so tried pulling a complete record via PowerShell instead",
    action: "Used Get-Printer to grab Name, DriverName, and PortName, then joined that with Get-PrinterPort on PortName to pull PrinterHostAddress — the actual IP address. Also checked which one was the default printer via the Default property from Get-CimInstance Win32_Printer, since missing that could mean print jobs silently going to the wrong printer after the switch",
    point: "A record only becomes usable once you have the driver name, port name, IP address, and default setting all together. But PowerShell output alone left some doubt about naming inconsistencies or missed entries, so the final step was always cross-checking against the actual Control Panel UI, or against MS-DOS-era commands like wmic printer list config. Knowing the newer tool matters, but so does not over-trusting it and pairing it with the older, more reliable method"
  },

  routeprint: {
    situation: "A user in the Japan office couldn't reach a U.S. government website",
    background: "The Japan office normally routes out to the internet through a corporate proxy in the U.S. headquarters network. But some government sites only allow direct access from U.S.-based IPs, blocking anything arriving through the proxy",
    action: "Set the PC up as dual-NIC: regular traffic kept going through the corporate proxy as usual, while traffic to that specific destination was routed over the direct U.S. internet connection instead. Checked the existing routing table with route print, then added a persistent static route with route add [destination] mask [mask] [gateway] -p",
    point: "The key is that an explicit destination route takes priority over the existing default gateway, letting you control the OS's routing decision for just that traffic. Route metric conflicts can sometimes prevent the switch from taking effect as intended, so always verify the actual path with tracert after adding the route"
  },

  testconnection: {
    situation: "Responded to a \"can't connect to the internet\" ticket, and it turned out part of the LAN was actually still alive",
    background: "The user's report was simply \"internet doesn't work,\" but if you ping without being deliberate about which interface you're targeting, you can misdiagnose which layer is actually broken",
    action: "First pinged the default gateway (LAN-side interface) — got a response. Then pinged the ISP-side WAN router — no response. At that point it was clear L2/L3 on the LAN was fine, but something was down on the WAN side, so the investigation shifted to the ISP or the WAN router itself",
    point: "Don't stop at \"ping works / doesn't work\" — always be conscious of which device and which interface you're actually targeting. Combine this with tracert to see exactly which hop the traffic stops at before you can pin down the real point of failure"
  },

  // Add more command episodes here as you write them
  // Example: resolvednsname: { situation: "...", background: "...", action: "...", point: "..." },

};

/* ---------- 4. Rendering ---------- */
const sidebar = document.getElementById("sidebar");

categories.forEach(cat => {
  const label = document.createElement("div");
  label.className = "category-label";
  label.textContent = cat.label;
  sidebar.appendChild(label);

  cat.items.forEach(key => {
    const btn = document.createElement("button");
    btn.className = "cmd-item" + (episodes[key] ? " has-note" : "");
    btn.dataset.key = key;
    btn.innerHTML = `<span class="dot"></span>${labels[key] || key}`;
    btn.onclick = () => selectCommand(key);
    sidebar.appendChild(btn);
  });
});

const prompt = "PS C:\\Users\\Administrator>";

function selectCommand(key){
  document.querySelectorAll(".cmd-item").forEach(el => el.classList.remove("active"));
  document.querySelector(`.cmd-item[data-key="${key}"]`).classList.add("active");

  document.getElementById("emptyState").style.display = "none";
  document.getElementById("content").style.display = "block";

  document.getElementById("cmdTitle").textContent = labels[key] || key;
  document.getElementById("cmdSub").textContent = episodes[key]
    ? "Field note available"
    : "Output only";

  let output = commands[key];
  output += "\n" + prompt + "<span class='terminal-cursor'></span>";
  document.getElementById("terminalOutput").innerHTML = output;

  const area = document.getElementById("fieldnoteArea");
  const ep = episodes[key];

  if (ep) {
    area.innerHTML = `
      <div class="fieldnote-wrap">
        <div class="fieldnote">
          <span class="fieldnote-tag">Field Note</span>
          <h3>How this was used in the field</h3>
          <div class="fn-row"><div class="fn-label">Situation</div><div class="fn-value">${ep.situation}</div></div>
          <div class="fn-row"><div class="fn-label">Background</div><div class="fn-value">${ep.background}</div></div>
          <div class="fn-row"><div class="fn-label">Action</div><div class="fn-value">${ep.action}</div></div>
          <div class="fn-point"><strong>Key point:</strong> ${ep.point}</div>
        </div>
      </div>
    `;
  } else {
    area.innerHTML = `<div class="fieldnote-empty">A field note for this command hasn't been written yet.</div>`;
  }
}

</script>
